name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pack pt-timeline-color
        run: |
          cd pt-timeline-color
          python pack.py

      - name: Pack jira-people-view
        run: |
          cd jira-people-view
          python pack.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pt-timeline-color/pt-timeline-color.zip
            jira-people-view/jira-people-view.zip
          generate_release_notes: true
          draft: false
          prerelease: false
